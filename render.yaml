services:
  - type: web
    name: farangfm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook_handler:app
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: farangfm-db
          property: connectionString

databases:
  - name: farangfm-db
    plan: free
